services:
  vkr-backend:
    container_name: vkr-backend
    build: docker/images/php
    working_dir: /app
    user: ${UID:-1000}:${GID:-1000}
    volumes:
      - ./:/app
      - .composer:/.composer
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG:-0}
      - ML_SERVICE_BASE_URL=${ML_SERVICE_BASE_URL:-http://vkr-ml-api:8000}
    env_file:
      - .env
      - .env.local
    networks:
      - vkr-inner-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  vkr-nginx:
    image: nginx:1.29-alpine
    container_name: vkr-nginx
    working_dir: /app
    volumes:
      - ./:/app:ro
      - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/hosts/symfony:/etc/nginx/symfony
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - vkr-inner-network
      - vkr-outer-network


networks:
  vkr-inner-network:
    name: vkr-scinside-internal
    external: true
  vkr-outer-network:
    name: vkr-scinside-external
    external: true
