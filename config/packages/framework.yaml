# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        # Keep dev sessions off the Windows bind mount used by Docker Desktop.
        # /api/me reads the security token from the session on every page reload.
        save_path: '/tmp/scinside/sessions/%kernel.environment%'
        metadata_update_threshold: 60

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
